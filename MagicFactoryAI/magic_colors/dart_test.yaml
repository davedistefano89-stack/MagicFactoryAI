# =============================================================================
# Magic Colors · dart_test.yaml
# =============================================================================
#
# flutter_test reads this file from the project root and applies its
# directives on top of every `flutter test` invocation. The M2.4 PHASE
# 2 known-issue surface is gated here AND via function-level annotations
# so the Win32 framework hang never blocks the dev box.
#
# TWO COMPLEMENTARY MECHANISMS
# ----------------------------
#
# 1. `tags:` block below — entries with `skip:` are skipped by default
#    on every host platform. `flutter test --tags m2-4-known-issue
#    --run-skipped` opts in. Tag value `m2-4-known-issue` is a
#    hyphenated Dart identifier (package:test rejects tag names
#    containing `.`); it matches the @Tags value in the 3 affected test
#    files.
#
# 2. `@TestOn('!windows')` on each test function (via library
#    directive) — hard-skips the affected tests on Win32 no matter what
#    flag is passed. The constraint is unconditional. Mac/Linux CI runs
#    the tests normally so a future Flutter SDK fix is regression-
#    checked the moment it lands.
#
# AFFECTED FILES (all carry @Tags('m2-4-known-issue') + @TestOn('!windows')
# on a NAMED library directive at the top):
#   ▸ magic_colors/test/unit/home/daily_reward_claim_test.dart
#   ▸ magic_colors/test/unit/home/daily_reward_claim_bisect_test.dart
#   ▸ magic_colors/test/unit/_probe/m2_4_phase2_probe_test.dart
#
# CONTACT
# -------
# See CHANGELOG.md (project root) §1.0.0-rc1 → Known Issues → M2.4
# PHASE 2 for the full diagnostic dossier and the upstream
# flutter/flutter reference.
# =============================================================================

tags:
  m2-4-known-issue:
    skip: >
      M2.4 PHASE 2 framework-level hang (Win32 only).
      Opt in via --run-skipped; see CHANGELOG §M2.4 PHASE 2.
